# Render blueprint for the Atbash sandbox.
#
# This is a private background worker — no public URL. After the first deploy,
# attach an SSH session via the Render dashboard ("Shell" tab).
#
# Spec: https://render.com/docs/blueprint-spec

services:
  - type: pserv
    name: atbash-sandbox
    runtime: docker
    dockerfilePath: ../Dockerfile
    plan: free
    autoDeploy: false
    envVars:
      - key: ATBASH_AGENT_KEY
        sync: false
      - key: ATBASH_ORG_NAME
        sync: false
      - key: ATBASH_ENDPOINT
        sync: false
      - key: ATBASH_BLOCKCHAIN_RID
        sync: false
      - key: ATBASH_PROVIDER
        sync: false
      - key: ATBASH_PROVIDER_MODEL
        sync: false
